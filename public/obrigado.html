    <style>
      :root {
        --primary: #5e6839;
        --primary-light: rgba(94, 104, 57, 0.1);
        --secondary: #acba8f;
        --background: #fafaf8;
        --foreground: #2c3020;
        --muted: #e8ebdf;
        --muted-fg: #4a4f3d;
        --card: #f8f9f5;
        --border: #d4d9c4;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Lora', Georgia, serif;
        background: linear-gradient(to bottom, var(--background), var(--muted));
        color: var(--foreground);
        min-height: 100vh;
        line-height: 1.55;
      }
      .font-display { font-family: 'Playfair Display', Georgia, serif; }
      .container { max-width: 42rem; margin: 0 auto; padding: 0 1rem; }
      .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 4rem 0; }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 2rem;
        text-align: center;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
      }
      @media (min-width: 768px) { .card { padding: 3rem; } }
      .icon-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 5rem;
        height: 5rem;
        border-radius: 50%;
        background: var(--primary-light);
        margin-bottom: 1.5rem;
      }
      .icon-wrap svg { width: 3rem; height: 3rem; color: var(--primary); }
      h1 { font-size: 1.875rem; font-weight: 600; margin: 0 0 1rem; color: var(--foreground); }
      @media (min-width: 768px) { h1 { font-size: 2.25rem; } }
      .lead { font-size: 1.125rem; color: var(--muted-fg); margin: 0 0 0.5rem; }
      .sub { font-size: 1rem; color: var(--muted-fg); margin: 0 0 2rem; }
      .countdown-box {
        background: rgba(232, 235, 223, 0.7);
        border-radius: 0.5rem;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .countdown-box p { margin: 0 0 0.75rem; font-size: 0.875rem; font-weight: 500; color: var(--foreground); }
      .countdown-box .count { font-weight: 600; color: var(--primary); }
      .btn-whatsapp {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        background: #25D366;
        color: white;
        border-radius: 0.5rem;
        font-weight: 500;
        text-decoration: none;
        font-family: inherit;
        font-size: 1rem;
        transition: background 0.2s;
      }
      .btn-whatsapp:hover { background: #20BA5C; color: white; }
      .btn-whatsapp svg { width: 1.25rem; height: 1.25rem; }
      .spinner { animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .link-inicio { display: inline-block; margin-top: 1.5rem; font-size: 0.875rem; color: var(--primary); text-decoration: none; }
      .link-inicio:hover { text-decoration: underline; }

          <p class="sub">Nossa equipe entrará em contato em breve para dar continuidade ao seu caso.</p>

    <script>
      (function() {
        var WHATSAPP_NUMBER = '5511976331094';
        var WHATSAPP_MESSAGE = encodeURIComponent('Olá! Preenchi o formulário de triagem para recurso de indeferimento. Gostaria de mais informações.');
        var url = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + WHATSAPP_MESSAGE;

        // Nome na URL
        var params = new URLSearchParams(window.location.search);
        var nome = params.get('nome') || '';
        if (nome) {
          var titulo = document.getElementById('titulo');
          if (titulo) titulo.textContent = 'Obrigado, ' + decodeURIComponent(nome) + '!';
        }

        document.getElementById('btn-wa').href = url;

        // Conversão: um único push no carregamento da página (evita duplicata; GTM dispara tag de conversão aqui)
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
          event: 'conversion_obrigado',
          conversion_page: 'obrigado',
          conversion_label: 'formulario_triagem_whatsapp',
          page_path: '/obrigado.html'
        });

        // Countdown e redirect
        var segundos = document.getElementById('segundos');
        var countEl = document.getElementById('countdown');
        var n = 5;
        var t = setInterval(function() {
          n--;
          if (countEl) countEl.textContent = n;
          if (segundos) segundos.textContent = n === 1 ? 'segundo' : 'segundos';
          if (n <= 0) {
            clearInterval(t);
            window.location.href = url;
          }
        }, 1000);
      })();
    </script>
